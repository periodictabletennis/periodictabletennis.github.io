<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Responsive Image</title>
    <style>
        /* Reset margins and default padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure the document container covers the whole screen */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Disables scrollbars */
            background-color: #000; /* Black fallback while image loads */
        }

        /* Responsive full-screen image rules */
        .full-page-img {
            width: 100vw;            /* 100% of screen width */
            height: 100vh;           /* 100% of screen height */
            object-fit: cover;       /* Scales and crops without distortion */
            object-position: center; /* Keeps center of image focused */
            display: block;          /* Removes default bottom baseline gap */
        }
    </style>
</head>
<body>

    <!-- Links directly to your ptt.PNG asset -->
    <img src="ptt.PNG" alt="Full screen background" class="full-page-img">

</body>
</html>
