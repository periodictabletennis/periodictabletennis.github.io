<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Responsive Image</title>
    <style>
        /* Clear page margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Make container match full screen size */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Fills empty side spaces with clean black */
        }

        body {
            background-image: url('ptt.PNG'); 
            
            /* KEY CHANGE: Shows the whole uncropped image */
            background-size: contain; 
            
            /* Keeps the image perfectly centered */
            background-position: center center; 
            
            /* Prevents image from repeating or duplicating */
            background-repeat: no-repeat; 
        }
    </style>
</head>
<body>
    <!-- Kept clear as the background handles layout presentation -->
</body>
</html>
