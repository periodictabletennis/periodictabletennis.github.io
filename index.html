<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Responsive Image</title>
    <style>
        /* Zero out default padding and layout constraints */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Lock the body wrapper tightly to the edges of the display */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Smooth backdrop color */
        }

        body {
            /* Loads your specific image asset */
            background-image: url('ptt.PNG'); 
            
            /* Dynamically stretches or scales the file to cover the entire page */
            background-size: cover; 
            
            /* Forces the absolute mathematical center to stay anchored */
            background-position: center center; 
            
            /* Disables tiling repeating bugs on wide desktop resolutions */
            background-repeat: no-repeat; 
        }
    </style>
</head>
<body>
    <!-- The body background handles the rendering, so no HTML tags are needed inside here -->
</body>
</html>
